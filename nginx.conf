server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Keep redirects relative so they work on any port (dev or prod)
    absolute_redirect off;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Disable caching for CSS and JS so theme changes are instant
    location ~* \.(css|js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }
}
